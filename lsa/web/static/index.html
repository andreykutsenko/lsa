<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSA Web UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-brand">
        <span class="topbar-logo">LSA</span>
        <span class="topbar-subtitle">Legacy Script Archaeologist</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-snap" id="current-snap">No snapshot selected</span>
      </div>
    </header>

    <nav class="sidebar">
      <div class="nav-section">
        <div class="nav-section-title">Pipeline</div>
        <div class="step active" data-step="snapshot">Snapshot</div>
        <div class="step" data-step="bundle">Bundle</div>
        <div class="step" data-step="prompt">Prompt</div>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Context</div>
        <div class="step" data-step="stats">Overview</div>
        <div class="step" data-step="search">Search</div>
      </div>
    </nav>

    <main class="content" id="content">
    </main>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
